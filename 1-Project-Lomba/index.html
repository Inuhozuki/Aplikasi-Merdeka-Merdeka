<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Portal Lomba Kemerdekaan 🇮🇩</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header id="app-header">
    <div class="header-inner">
      <div class="header-logo">
        <span class="logo-flag">🇮🇩</span>
        <div class="logo-text">
          <span class="logo-title">PORTAL LOMBA</span>
          <span class="logo-sub">Kemerdekaan 79</span>
        </div>
      </div>
      <div class="header-sport" id="header-sport-badge"></div>
    </div>
  </header>

  <!-- MAIN APP -->
  <main id="app">

    <!-- ===================== HUB ===================== -->
    <section id="hub" class="section active">
      <div class="container">
        <div class="hub-hero">
          <div class="hero-ornament">
            <span class="ornament-circle c1"></span>
            <span class="ornament-circle c2"></span>
            <span class="ornament-circle c3"></span>
          </div>
          <h1 class="hero-title">TURNAMEN<br><span class="text-accent">OLAHRAGA</span></h1>
          <p class="hero-sub">Pilih cabang olahraga untuk memulai turnamen</p>
        </div>

        <div class="sport-grid">
          <button class="sport-card" data-sport="futsal" onclick="selectSport('futsal')">
            <div class="sport-icon">⚽</div>
            <div class="sport-name">FUTSAL</div>
            <div class="sport-desc">5 vs 5 · Lapangan Indoor</div>
            <div class="sport-arrow">→</div>
          </button>
          <button class="sport-card" data-sport="basket" onclick="selectSport('basket')">
            <div class="sport-icon">🏀</div>
            <div class="sport-name">BASKET</div>
            <div class="sport-desc">5 vs 5 · Lapangan Outdoor</div>
            <div class="sport-arrow">→</div>
          </button>
        </div>

        <div class="hub-footer">
          <div class="hub-stats" id="hub-stats"></div>
        </div>
      </div>
    </section>

    <!-- ===================== TEAMS ===================== -->
    <section id="teams" class="section hidden">
      <div class="container">
        <div class="section-header">
          <h2 class="section-title">MANAJEMEN TIM</h2>
          <span class="section-count" id="team-count-badge">0 Tim</span>
        </div>

        <!-- Form Tambah Tim -->
        <div class="card form-card">
          <div class="card-label">DAFTARKAN TIM BARU</div>
          <div class="form-group">
            <label class="form-label">Nama Tim</label>
            <input type="text" id="input-team-name" class="form-input" placeholder="Contoh: Garuda FC" maxlength="30" />
          </div>
          <div class="form-group">
            <label class="form-label">Nama Pemain <span class="label-hint">(pisahkan dengan koma)</span></label>
            <textarea id="input-players" class="form-input form-textarea" placeholder="Budi, Andi, Dani, Sari, Reno" rows="3"></textarea>
          </div>
          <button class="btn btn-primary btn-full" onclick="addTeam()">
            <span>+ TAMBAH TIM</span>
          </button>
        </div>

        <!-- List Tim -->
        <div id="teams-list" class="teams-list"></div>

        <!-- Actions -->
        <div class="action-row" id="team-actions" style="display:none;">
          <button class="btn btn-outline" onclick="copyTeams()">📋 Salin Data</button>
          <button class="btn btn-outline btn-danger" onclick="clearAllTeams()">🗑 Hapus Semua</button>
        </div>
      </div>
    </section>

    <!-- ===================== BRACKET ===================== -->
    <section id="bracket" class="section hidden">
      <div class="container">
        <div class="section-header">
          <h2 class="section-title">BAGAN TURNAMEN</h2>
          <button class="btn btn-sm btn-primary" onclick="generateBracket()">⚡ Generate</button>
        </div>

        <div id="bracket-info" class="bracket-info hidden"></div>
        <div id="bracket-container" class="bracket-container"></div>
        <div id="bracket-empty" class="empty-state">
          <div class="empty-icon">🏆</div>
          <p>Tambahkan minimal 2 tim dahulu,<br>lalu tekan Generate</p>
          <button class="btn btn-primary btn-sm" onclick="showSection('teams')">Ke Manajemen Tim</button>
        </div>
      </div>
    </section>

    <!-- ===================== SCOREBOARD ===================== -->
    <section id="scoreboard" class="section hidden">
      <div class="container">
        <div class="section-header">
          <h2 class="section-title">SCOREBOARD</h2>
        </div>

        <!-- Match Selector -->
        <div class="card match-selector-card">
          <div class="card-label">PILIH PERTANDINGAN</div>
          <div class="form-group">
            <label class="form-label">Tim Kiri (Tuan Rumah)</label>
            <select id="select-team-left" class="form-input form-select" onchange="updateScoreboardTeams()">
              <option value="">-- Pilih Tim --</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Tim Kanan (Tamu)</label>
            <select id="select-team-right" class="form-input form-select" onchange="updateScoreboardTeams()">
              <option value="">-- Pilih Tim --</option>
            </select>
          </div>
        </div>

        <!-- Scoreboard Display -->
        <div class="scoreboard-display" id="scoreboard-display">
          <div class="score-team score-left">
            <div class="score-team-name" id="score-name-left">TIM A</div>
            <div class="score-number" id="score-left">0</div>
            <div class="score-controls">
              <button class="btn-score btn-score-minus" onclick="updateScore('left', -1)">−</button>
              <button class="btn-score btn-score-plus" onclick="updateScore('left', 1)">+</button>
            </div>
          </div>

          <div class="score-center">
            <div class="score-vs">VS</div>
            <div class="score-separator">:</div>
            <button class="btn btn-outline btn-sm btn-reset" onclick="resetScore()">RESET</button>
          </div>

          <div class="score-team score-right">
            <div class="score-team-name" id="score-name-right">TIM B</div>
            <div class="score-number" id="score-right">0</div>
            <div class="score-controls">
              <button class="btn-score btn-score-minus" onclick="updateScore('right', -1)">−</button>
              <button class="btn-score btn-score-plus" onclick="updateScore('right', 1)">+</button>
            </div>
          </div>
        </div>

        <!-- Winner Banner -->
        <div id="winner-banner" class="winner-banner hidden"></div>

        <!-- Buzzer -->
        <div class="buzzer-row">
          <button class="btn-buzzer" onclick="playBuzzer()" title="Buzzer">
            🔔 BUZZER
          </button>
        </div>

        <!-- History -->
        <div class="card history-card" id="score-history-card" style="display:none;">
          <div class="card-label">RIWAYAT SKOR</div>
          <div id="score-history-list" class="history-list"></div>
        </div>
      </div>
    </section>

  </main>

  <!-- BOTTOM NAV -->
  <nav id="bottom-nav">
    <button class="nav-item active" data-section="hub" onclick="navTo('hub')">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">Hub</span>
    </button>
    <button class="nav-item" data-section="teams" onclick="navTo('teams')">
      <span class="nav-icon">👥</span>
      <span class="nav-label">Tim</span>
    </button>
    <button class="nav-item" data-section="bracket" onclick="navTo('bracket')">
      <span class="nav-icon">🏆</span>
      <span class="nav-label">Bagan</span>
    </button>
    <button class="nav-item" data-section="scoreboard" onclick="navTo('scoreboard')">
      <span class="nav-icon">📊</span>
      <span class="nav-label">Skor</span>
    </button>
  </nav>

  <!-- TOAST -->
  <div id="toast" class="toast hidden"></div>

  <!-- MODAL -->
  <div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-actions" id="modal-actions"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
